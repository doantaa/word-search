<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Search Game</title>
</head>

<body class="min-h-screen flex flex-col antialiased text-slate-100 overflow-x-hidden relative">

  <!-- Background Image -->
  <div id="game-background"
    class="fixed inset-0 z-0 pointer-events-none bg-cover bg-center bg-no-repeat opacity-100 transition-opacity duration-1000"
    style="background-image: url('https://cdn.jsdelivr.net/gh/repixelhouse/personal-cdn@main/portfolio/2026Background.jpg');">
  </div>
  <div class="fixed inset-0 z-0 pointer-events-none bg-slate-900/10"></div>

  <div id="app" class="flex-grow flex flex-col relative w-full h-full"></div>

  <!-- Music Toggle Button -->
  <button id="music-toggle"
    class="fixed top-4 right-4 z-50 p-3 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full border border-white/30 transition-all duration-300 shadow-lg text-white">
    <svg id="music-on-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z">
      </path>
    </svg>
    <svg id="music-off-icon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"
      xmlns="http://www.w3.org/2000/svg">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"
        clip-rule="evenodd"></path>
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2">
      </path>
    </svg>
  </button>

  <audio id="bg-music" loop>
    <source src="/background.mp3" type="audio/mpeg">
  </audio>
  <script type="module" src="/src/main.js"></script>
</body>

</html>

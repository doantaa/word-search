<!-- Win Modal (Hidden by default) -->
<div id="win-modal" class="fixed inset-0 bg-white/10 backdrop-blur-md z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300">
  <div class="bg-white/20 p-8 sm:p-12 rounded-3xl shadow-2xl border border-white/30 text-center max-w-md w-full mx-4 transform scale-95 transition-transform duration-300 backdrop-blur-xl">
    <div class="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>
    <h2 class="text-3xl font-extrabold text-white mb-2">Kamu Menang!</h2>
    <p class="text-white/80 mb-2 font-medium">Semua kata berhasil ditemukan.</p>
    <p class="text-emerald-400 font-mono font-bold text-2xl mb-8">Time Left: <span id="win-time">00:00</span></p>

    <div class="flex gap-4">
      <button id="btn-play-again" class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-colors shadow-[0_0_20px_rgba(16,185,129,0.4)]">
        Play Again
      </button>
      <button id="btn-win-menu" class="flex-1 py-4 bg-white/10 hover:bg-white/20 text-white rounded-xl font-bold text-lg transition-colors border border-white/20">
        Menu
      </button>
    </div>
  </div>
</div>

<!-- Lose Modal (Hidden by default) -->
<div id="lose-modal" class="fixed inset-0 bg-black/40 backdrop-blur-md z-50 hidden items-center justify-center opacity-0 transition-opacity duration-300">
  <div class="bg-white/20 p-8 sm:p-12 rounded-3xl shadow-2xl border border-white/30 text-center max-w-md w-full mx-4 transform scale-95 transition-transform duration-300 backdrop-blur-xl">
    <div class="w-20 h-20 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </div>
    <h2 class="text-3xl font-extrabold text-white mb-2">Waktu Habis!</h2>
    <p class="text-white/80 mb-8 font-medium">Kamu belum menemukan semua kata.</p>

    <div class="flex gap-4">
      <button id="btn-lose-play-again" class="flex-1 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-lg transition-colors shadow-[0_0_20px_rgba(79,70,229,0.4)]">
        Try Again
      </button>
      <button id="btn-lose-menu" class="flex-1 py-4 bg-white/10 hover:bg-white/20 text-white rounded-xl font-bold text-lg transition-colors border border-white/20">
        Menu
      </button>
    </div>
  </div>
</div>
